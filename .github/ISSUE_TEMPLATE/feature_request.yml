name: Feature request
description: Suggest a new tool, a new cycle pattern, or a workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for new tools, new cycle patterns, or workflow improvements. For new cycle patterns specifically, please include a real `.memgraph` snippet (sanitized) showing the chain — that's much faster to act on than a description.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before the solution.
      placeholder: e.g. "I keep finding leaks where Combine `.sink` closures capture self strongly and there's no built-in classifier match for them."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (optional)
      description: If you have an idea for the API or implementation, sketch it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, scripts, or workflows you've used or rejected.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Examples / data
      description: A real `.memgraph` chain (sanitized), a `xctrace` excerpt, or screenshots — whatever makes the request concrete.
    validations:
      required: false
